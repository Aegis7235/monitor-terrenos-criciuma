  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }

    /* Painel de filtros — canto inferior esquerdo */
    #painel {
      position: fixed;
      bottom: 30px;
      left: 10px;
      z-index: 9999;
      background: white;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,.22);
      font-family: Arial, sans-serif;
      font-size: 13px;
      min-width: 220px;
      max-width: 260px;
    }
    #painel h4 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #2c3e50;
    }
    .filtro-bloco {
      margin-bottom: 12px;
    }
    .filtro-bloco label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
      color: #34495e;
    }
    #area-slider {
      width: 100%;
      accent-color: #2980b9;
    }
    #area-valor {
      display: inline-block;
      margin-top: 3px;
      color: #2980b9;
      font-weight: bold;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-sw {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 22px;
      transition: .3s;
    }
    .slider-sw:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider-sw { background: #e74c3c; }
    input:checked + .slider-sw:before { transform: translateX(16px); }

    /* Legenda */
    #legenda {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #555;
    }
    #legenda b { color: #2c3e50; }
    .leg-item { margin: 2px 0; }

    #contador {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #666;
      text-align: center;

    #contador b { color: #2980b9; }

// Cluster

// Cria marcadores com ícone colorido
function criarIcone(d) {
  const bg = d.novo ? '#c0392b' : d.cor;
  return L.divIcon({
    className: '',
    html: `<div style="
      background:${bg};
      color:white;
      border-radius:50%;
      width:28px;height:28px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.4);
      border:2px solid rgba(255,255,255,.8);
    ">${d.icone}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16],
  });
}

const marcadores = DADOS.map(d => {
  const m = L.marker([d.lat, d.lon], { icon: criarIcone(d) });
  m.bindPopup(d.popup, { maxWidth: 300 });
  m.bindTooltip(d.tooltip);
  m._dados = d;
  return m;
});

// Aplica filtros
function aplicarFiltros() {
  const areaMin  = parseInt(document.getElementById('area-slider').value) || 0;
  const soNovos  = document.getElementById('toggle-novos').checked;

  cluster.clearLayers();
  let visiveis = 0;

  marcadores.forEach(m => {
    const d = m._dados;
    const areaOk = areaMin === 0 || (d.area && d.area >= areaMin);
    const novoOk = !soNovos || d.novo;
    if (areaOk && novoOk) {
      cluster.addLayer(m);
      visiveis++;
    }
  });

  document.getElementById('n-visiveis').textContent = visiveis;
}

// Eventos dos filtros
document.getElementById('area-slider').addEventListener('input', function() {
  document.getElementById('area-valor').textContent = this.value;
  aplicarFiltros();
});
document.getElementById('toggle-novos').addEventListener('change', aplicarFiltros);

// Inicializa
aplicarFiltros();
