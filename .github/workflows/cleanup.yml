name: Limpeza do Banco

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Executar limpeza
        run: python cleanup.py
      - name: Regenerar mapa
        run: |
          python -c "
from utils.database import init_db, carregar_todos
from utils.map_generator import gerar_mapa
init_db()
todos = carregar_todos()
gerar_mapa(todos, novos_ids=[])
print(f'Mapa gerado com {len(todos)} anúncios')
"
      - run: |
          git config user.email "bot@monitor-terrenos"
          git config user.name "Monitor Bot"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Limpeza do banco" && git push

