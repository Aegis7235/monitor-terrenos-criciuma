name: Monitor de Terrenos
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,9,15,21 * * *"
jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Executar monitor
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - run: |
          git config user.email "bot@monitor-terrenos"
          git config user.name "Monitor Bot"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Atualização automática" && git push
